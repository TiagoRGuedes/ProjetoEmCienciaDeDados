<!DOCTYPE html> <!-- Informa ao navegador que o arquivo usa HTML5. -->
<html lang="pt-BR"> <!-- Abre o documento HTML em português do Brasil. -->
<head> <!-- Abre a área de configurações da tela de login. -->
  <meta charset="UTF-8"> <!-- Permite acentos e caracteres especiais. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Ajusta o layout para celular e computador. -->
  <title>Login — Esmalteria Admin</title> <!-- Define o título da aba do navegador. -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}"> <!-- Carrega o CSS do admin. -->
</head> <!-- Fecha o head. -->
<body class="login-page"> <!-- Abre o corpo da página com classe específica de login. -->
  <div class="login-card"> <!-- Cria o cartão centralizado de login. -->
    <div class="login-logo"> <!-- Cria a área visual do logo. -->
      <div class="icon">R</div> <!-- Mostra a inicial da marca. -->
      <h1>Refúgio da Preta · Admin</h1> <!-- Mostra o título da área administrativa. -->
      <div class="subtitle">Acesso restrito</div> <!-- Mostra um subtítulo. -->
    </div> <!-- Fecha a área do logo. -->

    {% if erro %} {# Verifica se existe erro de login. #}
      <ul class="flash-list"> <!-- Cria lista de mensagens. -->
        <li class="flash flash-error">{{ erro }}</li> <!-- Mostra erro de login. -->
      </ul> <!-- Fecha lista de mensagens. -->
    {% endif %} {# Fecha a verificação de erro. #}

    <form method="POST" action="{{ url_for('admin.login') }}" class="form-grid"> <!-- Cria formulário de login. -->
      <div class="form-group"> <!-- Agrupa o campo usuário. -->
        <label class="form-label" for="usuario">Usuário</label> <!-- Rótulo do usuário. -->
        <input class="form-input" type="text" id="usuario" name="usuario" autocomplete="username" required autofocus> <!-- Campo de usuário. -->
      </div> <!-- Fecha grupo de usuário. -->
      <div class="form-group"> <!-- Agrupa o campo senha. -->
        <label class="form-label" for="senha">Senha</label> <!-- Rótulo da senha. -->
        <input class="form-input" type="password" id="senha" name="senha" autocomplete="current-password" required> <!-- Campo de senha. -->
      </div> <!-- Fecha grupo da senha. -->
      <div class="form-actions"> <!-- Cria área do botão. -->
        <button type="submit" class="btn btn-primary" style="width:100%;">Entrar</button> <!-- Botão que envia o login. -->
      </div> <!-- Fecha área do botão. -->
    </form> <!-- Fecha formulário de login. -->
  </div> <!-- Fecha cartão de login. -->
</body> <!-- Fecha corpo. -->
</html> <!-- Fecha documento HTML. -->
