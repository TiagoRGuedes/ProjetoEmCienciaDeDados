{% extends "base.html" %}
{% block conteudo %}
<section class="secao confirmado">
    <div class="container">
        <h2>Solicitação enviada com sucesso</h2>
        <p>Seu pedido foi registrado como pendente e será confirmado pela equipe do {{ empresa.nome }}.</p>
        <p><strong>Contato:</strong> {{ empresa.telefone }}</p>
        <a class="botao" href="{{ url_for('publico.index') }}">Voltar ao início</a>
        <a class="botao-secundario" href="{{ url_for('publico.agendar_get') }}">Novo agendamento</a>
    </div>
</section>
{% endblock %}
