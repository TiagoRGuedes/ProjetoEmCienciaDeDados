<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Esmalteria Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">R</div>
      <h1>Refúgio da Preta · Admin</h1>
      <div class="subtitle">Acesso restrito</div>
    </div>

    {% if erro %}
      <ul class="flash-list">
        <li class="flash flash-error">{{ erro }}</li>
      </ul>
    {% endif %}

    <form method="POST" action="{{ url_for('admin.login') }}" class="form-grid">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label" for="usuario">Usuário</label>
        <input class="form-input" type="text" id="usuario" name="usuario" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="senha">Senha</label>
        <input class="form-input" type="password" id="senha" name="senha" autocomplete="current-password" required>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" style="width:100%;">Entrar</button>
      </div>
    </form>
    <div style="text-align:center; margin-top:1rem;">
      <a href="{{ url_for('publico.index') }}" style="display:inline-block; padding:0.4rem 1.2rem; border:1.5px solid currentColor; border-radius:6px; text-decoration:none; color:inherit; font-size:0.9rem; opacity:0.7;">Voltar ao site</a>
    </div>
  </div>
</body>
</html>
