<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Esmalteria Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">R</div>
      <h1>Refúgio da Preta · Admin</h1>
      <div class="subtitle">Acesso restrito</div>
    </div>

    {% if erro %}
      <ul class="flash-list">
        <li class="flash flash-error">{{ erro }}</li>
      </ul>
    {% endif %}

    <form method="POST" action="{{ url_for('admin.login') }}" class="form-grid">
      <div class="form-group">
        <label class="form-label" for="usuario">Usuário</label>
        <input class="form-input" type="text" id="usuario" name="usuario" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="senha">Senha</label>
        <input class="form-input" type="password" id="senha" name="senha" autocomplete="current-password" required>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" style="width:100%;">Entrar</button>
      </div>
    </form>
  </div>
</body>
</html>
