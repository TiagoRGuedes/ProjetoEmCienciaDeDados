{% extends 'admin/_base.html' %}
{% block title %}{% if servico %}Editar serviço{% else %}Novo serviço{% endif %}{% endblock %}
{% block content %}

<div class="page-header">
  <h1 class="page-title">{% if servico %}Editar serviço{% else %}Novo serviço{% endif %}</h1>
</div>

<div class="card" style="max-width: 560px;">
  {% if erro %}
    <ul class="flash-list"><li class="flash flash-error">{{ erro }}</li></ul>
  {% endif %}

  <form method="POST" class="form-grid">
    <div class="form-group">
      <label class="form-label" for="nome">Nome do serviço</label>
      <input class="form-input" type="text" id="nome" name="nome"
             value="{{ form.nome if form else (servico.nome if servico else '') }}"
             required maxlength="80" autofocus>
    </div>

    <div class="form-group">
      <label class="form-label" for="preco">Preço (R$)</label>
      <input class="form-input" type="number" id="preco" name="preco"
             value="{{ form.preco if form else (servico.preco if servico else '') }}"
             step="0.01" min="0" required>
    </div>

    <div class="form-group">
      <label class="form-label" for="duracao_min">Duração (minutos)</label>
      <input class="form-input" type="number" id="duracao_min" name="duracao_min"
             value="{{ form.duracao_min if form else (servico.duracao_min if servico else '') }}"
             step="5" min="5" required>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">
        {% if servico %}Salvar alterações{% else %}Criar serviço{% endif %}
      </button>
      <a href="{{ url_for('admin.servicos') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>

{% endblock %}
