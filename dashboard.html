{% extends "base.html" %} <!-- Usa o layout base do site. -->
{% block conteudo %} <!-- Começa o conteúdo específico da página de serviços. -->
<section class="secao"> <!-- Cria uma seção com espaçamento padrão. -->
    <div class="container"> <!-- Centraliza o conteúdo na tela. -->
        <h2>Serviços</h2> <!-- Mostra o título da página. -->
        <p class="texto-central">Veja os serviços cadastrados no sistema do {{ empresa.nome }}.</p> <!-- Explica a página. -->
        <div class="cards-servicos"> <!-- Cria a área dos cards de serviços. -->
            {% for s in servicos %} <!-- Repete um card para cada serviço vindo do banco. -->
            <div class="card-servico"> <!-- Abre o card individual. -->
                <h3>{{ s.nome }}</h3> <!-- Mostra o nome do serviço. -->
                <p><strong>Preço:</strong> R$ {{ "%.2f"|format(s.preco) }}</p> <!-- Mostra o preço formatado. -->
                <p><strong>Duração:</strong> {{ s.duracao_min }} minutos</p> <!-- Mostra a duração em minutos. -->
            </div> <!-- Fecha o card individual. -->
            {% endfor %} <!-- Fecha a repetição dos serviços. -->
        </div> <!-- Fecha a área dos cards. -->
        <br> <!-- Cria uma quebra visual antes do botão. -->
        <a class="botao" href="{{ url_for('publico.agendar_get') }}">Agendar um serviço</a> <!-- Botão para ir ao agendamento. -->
    </div> <!-- Fecha o container. -->
</section> <!-- Fecha a seção. -->
{% endblock %} <!-- Finaliza o conteúdo específico da página. -->
